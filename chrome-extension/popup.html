<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PhishGuard</title>
    <style>
        body {
            width: 300px;
            padding: 20px;
            background: #050505;
            color: white;
            font-family: 'Inter', sans-serif;
            text-align: center;
        }
        .logo {
            font-weight: 700;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }
        .logo span { color: #00f5ff; }
        .status {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .hint {
            margin-top: 15px;
            font-size: 0.75rem;
            color: #a0a0a0;
        }
    </style>
</head>
<body>
    <div class="logo">Phish<span>Guard</span></div>
    <div class="status">
        Real-time Protection Active
    </div>
    <div class="hint">
        Every website you visit is automatically scanned by our AI engine.
    </div>
</body>
</html>
